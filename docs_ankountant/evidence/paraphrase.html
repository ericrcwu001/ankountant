    <style>

  <body>
    <div class="wrap">
      <h1 id="title"></h1>
      <p class="foot">Reproduce: <code id="reproduce"></code> · generated <span id="ts"></span></p>

      <h2>Method</h2>
      <p class="hyp" id="method"></p>

      <h2>Verdict</h2>
      <div class="verdict" id="verdict"><span class="dot"></span><span id="verdict-text"></span></div>
      <ul class="checks" id="checks"></ul>

      <h2>Memory vs Performance, per cohort</h2>
      <div class="legend">
        <span><span class="swatch" style="background:var(--mem)"></span>Memory (study-pile recall)</span>
        <span><span class="swatch" style="background:var(--perf)"></span>Performance (reworded sealed items)</span>
      </div>
      <div class="cohorts" id="cohorts"></div>

      <h2>Per-topic — memorizer cohort</h2>
      <div class="card"><table id="table"></table></div>

      <p class="note" id="note"></p>

      <details>
        <summary>Raw JSON record</summary>
        <pre id="raw"></pre>
      </details>
    </div>

    <script>
      const DATA = {
  "cohorts": [
    {
      "mean_gap": 0.4,
      "mean_memory": 0.9,
      "mean_performance": 0.5,
      "name": "Rote memorizer",
      "topics": [
        {
          "gap": 0.4,
          "memory": 0.9,
          "performance": 0.5,
          "topic": "capitalize vs expense"
        }
      ]
    },
    {
      "mean_gap": 0.050000000000000044,
      "mean_memory": 0.9,
      "mean_performance": 0.85,
      "name": "Genuine mastery",
      "topics": [
        {
          "gap": 0.050000000000000044,
          "memory": 0.9,
          "performance": 0.85,
          "topic": "capitalize vs expense"
        }
      ]
    }
  ],
  "generated_at": 1783108273,
  "method": "Two cohorts share the SAME study-pile recall (Memory); only the sealed reworded-item accuracy (Performance) differs. Memory reads trailing-30d recall on the study cards; Performance reads the label-stripped sealed 'which treatment applies?' items — the same idea in new words. If Performance merely echoed Memory the two would move together; instead Performance follows the reworded items and the gap opens.",
  "note": "A fair test that could fail: had Performance copied Memory, both cohorts would read ~90% Performance and ~0 gap regardless of the reworded-item accuracy. It does not — Performance tracks the sealed items, so the two signals are genuinely distinct.",
  "reproduce": "just ankountant-evidence",
  "title": "Paraphrase test — Performance is not a copy of Memory (rubric 7d)",
  "verdict": {
    "gap_reflects_divergence": true,
    "memory_held_constant": true,
    "passed": true,
    "performance_tracks_reworded_items": true
  }
};
      const $ = (id) => document.getElementById(id);
      const pct = (x) => `${(Number(x) * 100).toFixed(0)}%`;
      const pts = (x) => `${(Number(x) * 100).toFixed(0)} pts`;

      $("title").textContent = DATA.title;
      $("reproduce").textContent = DATA.reproduce;
      $("ts").textContent = new Date((DATA.generated_at || 0) * 1000).toISOString();
      $("method").textContent = DATA.method;
      $("note").textContent = DATA.note;
      $("raw").textContent = JSON.stringify(DATA, null, 2);

      const v = DATA.verdict || {};
      $("verdict-text").textContent = v.passed
        ? "Performance is NOT a copy of Memory — the reworded-item signal is genuinely distinct."
        : "Inconclusive on this run.";
      if (!v.passed) {
        $("verdict").style.borderColor = "var(--bad)";
        document.querySelector("#verdict .dot").style.background = "var(--bad)";
      }
      const check = (ok, label) =>
        `<li><span class="${ok ? "ok" : "no"}">${ok ? "✓" : "✗"}</span> ${label}</li>`;
      $("checks").innerHTML =
        check(v.memory_held_constant, "Memory held constant across both cohorts") +
        check(v.performance_tracks_reworded_items, "Performance tracks the reworded-item accuracy, not Memory") +
        check(v.gap_reflects_divergence, "Memory − Performance gap opens only for the memorizer");

      const cohorts = DATA.cohorts || [];
      $("cohorts").innerHTML = cohorts
        .map(
          (c) => `
        <div class="card">
          <h3>${c.name}</h3>
          <div class="bars">
            <div class="barrow"><span class="barlabel">Memory</span>
              <div class="bartrack"><div class="bar mem" style="width:${c.mean_memory * 100}%"></div></div>
              <span class="barnum">${pct(c.mean_memory)}</span></div>
            <div class="barrow"><span class="barlabel">Performance</span>
              <div class="bartrack"><div class="bar perf" style="width:${c.mean_performance * 100}%"></div></div>
              <span class="barnum">${pct(c.mean_performance)}</span></div>
          </div>
          <div class="gap">Memory − Performance gap: <strong>${pts(c.mean_gap)}</strong></div>
        </div>`
        )
        .join("");

      const memo = cohorts[0] || { topics: [] };
      $("table").innerHTML =
        `<tr><th>Topic</th><th class="num">Memory</th><th class="num">Performance</th><th class="num">Gap</th></tr>` +
        (memo.topics || [])
          .map(
            (t) =>
              `<tr><td>${t.topic}</td><td class="num">${pct(t.memory)}</td><td class="num">${pct(t.performance)}</td><td class="num">${pts(t.gap)}</td></tr>`
          )
          .join("");
    </script>
  </body>
